<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>ContextBubble</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <h1>ContextBubble</h1>
    <label for="learner-level">Learner level</label>
    <select id="learner-level">
      <option value="beginner">Beginner</option>
      <option value="intermediate">Intermediate</option>
      <option value="advanced">Advanced</option>
    </select>
    <label for="api-token">API token</label>
    <input id="api-token" type="password" autocomplete="off">
    <label class="inline">
      <input id="demo-mode" type="checkbox">
      Demo mode
    </label>
    <button id="open-captions" type="button">Open Captions</button>
    <button id="analyze" type="button">Analyze Video</button>
    <button id="reanalyze" type="button">Re-analyze</button>
    <p id="status">Open a YouTube video, start the backend, then analyze.</p>
    <script src="popup.js"></script>
  </body>
</html>
