<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>ContextBubble</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <h1>ContextBubble</h1>
    <label for="learner-level">Learner level</label>
    <select id="learner-level">
      <option value="beginner">Beginner</option>
      <option value="intermediate">Intermediate</option>
      <option value="advanced">Advanced</option>
    </select>
    <input id="subtitle" type="file" accept=".vtt,.srt">
    <button id="analyze" type="button">Analyze Video</button>
    <p id="status">Open a YouTube video, start the backend, then analyze.</p>
    <script src="popup.js"></script>
  </body>
</html>
