services:
  backend:
    build:
      context: .
      args:
        WHISPER_CPP_REF: "${WHISPER_CPP_REF:-v1.8.6}"
        YT_DLP_VERSION: "${YT_DLP_VERSION:-2026.7.4}"
    image: contextbubble-backend:cpu
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      CONTEXTBUBBLE_TOKEN: "${CONTEXTBUBBLE_TOKEN:-}"
      CONTEXTBUBBLE_HOST: "0.0.0.0"
      CONTEXTBUBBLE_PORT: "8000"
      CONTEXTBUBBLE_DATA_DIR: "/data"
      YTDLP_CMD: "yt-dlp"
      FFMPEG_CMD: "ffmpeg"
      FFPROBE_CMD: "ffprobe"
      WHISPER_CMD: "/opt/whisper/bin/whisper-cli"
      WHISPER_MODEL: "${WHISPER_MODEL:-/models/ggml-base.en.bin}"
      WHISPER_MODEL_URL: "${WHISPER_MODEL_URL:-https://huggingface.co/ggerganov/whisper.cpp/resolve/80da2d8bfee42b0e836fc3a9890373e5defc00a6/ggml-base.en.bin}"
      WHISPER_MODEL_SHA256: "${WHISPER_MODEL_SHA256:-a03779c86df3323075f5e796cb2ce5029f00ec8869eee3fdfb897afe36c6d002}"
      WHISPER_LANGUAGE: "${WHISPER_LANGUAGE:-en}"
      WHISPER_NO_GPU: "1"
      AGENT_MODE: "${AGENT_MODE:-heuristic}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen3:8b}"
      DEMO_VIDEO_IDS: "${DEMO_VIDEO_IDS:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "contextbubble-data:/data"
      - "contextbubble-models:/models"

volumes:
  contextbubble-data:
    name: contextbubble-data
  contextbubble-models:
    name: contextbubble-models
